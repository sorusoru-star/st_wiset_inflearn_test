<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 검색 트렌드 대시보드 (핫팩 vs 선풍기)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>시즌별 키워드 분석 대시보드</h1>
            <p class="subtitle">핫팩 & 선풍기 검색 트렌드 및 쇼핑 데이터 분석 (최근 1개년)</p>
        </header>

        <div class="stats-overview">
            <div class="stat-card" id="trend-summary">
                <h3>연간 검색 트렌드</h3>
                <canvas id="trendChart"></canvas>
            </div>
            
            <div class="side-panel">
                <div class="stat-card mini">
                    <h4>쇼핑 최저가 분포</h4>
                    <canvas id="priceChart"></canvas>
                </div>
                <div class="stat-card mini">
                    <h4>주요 브랜드 점유율</h4>
                    <canvas id="brandChart"></canvas>
                </div>
            </div>
        </div>

        <section class="details-section">
            <div class="data-table-container">
                <h3>뉴스 및 블로그 최근 게시물</h3>
                <div id="contentList" class="content-grid">
                    <!-- Data will be injected here -->
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 Naver API Analytics Project. All data is for demonstration purposes.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
